version: '3.8'

services:
  postgres:
    image: postgres:13
    platform: linux/x86_64
    container_name: postgres-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: basededatos
      POSTGRES_DB: bandidos-ms
    ports:
      - "35432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: